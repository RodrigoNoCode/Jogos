<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Memória Maker - Robótica</title>
<style>
:root{--bg1:#061b3a;--bg2:#123d7a;--gold:#ffd56a;--gold-dark:#b57918;--text:#fff7df;--green:#33d680;--red:#ff6868;--border:rgba(255,213,106,.35)}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:Arial,Helvetica,sans-serif;background:radial-gradient(circle at top left,rgba(255,213,106,.14),transparent 30%),radial-gradient(circle at top right,rgba(41,124,255,.22),transparent 35%),linear-gradient(180deg,var(--bg2),var(--bg1) 55%,#020712);color:var(--text)}.wrap{max-width:1120px;margin:auto;padding:24px}.card{background:linear-gradient(145deg,rgba(255,255,255,.12),rgba(255,255,255,.035));border:1px solid var(--border);border-radius:30px;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.35)}.logo{width:110px;height:110px;object-fit:contain;display:block;margin:0 auto 10px;filter:drop-shadow(0 0 16px rgba(255,213,106,.65));border-radius:22px}h1{margin:0;text-align:center;color:var(--gold);font-size:clamp(34px,5vw,52px);text-shadow:0 0 18px rgba(255,213,106,.35)}.sub{font-size:19px;line-height:1.5;opacity:.92;text-align:center}input,select{width:100%;padding:15px;border-radius:16px;border:1px solid rgba(255,213,106,.45);background:rgba(255,255,255,.12);color:white;font-size:18px;margin:8px 0 14px}select option{color:#111}button,.btnlink{border:0;border-radius:18px;padding:14px 18px;margin:6px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#1d1200;font-weight:bold;cursor:pointer;font-size:17px;box-shadow:0 8px 20px rgba(0,0,0,.25);text-decoration:none;display:inline-block}button:hover,.btnlink:hover{transform:translateY(-2px)}.actions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:12px}.topbar{display:flex;gap:12px;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap}.pill{background:rgba(0,0,0,.25);border:1px solid var(--border);padding:10px 15px;border-radius:999px;font-weight:700}.grid{display:grid;gap:12px;margin:20px auto 8px;max-width:820px}.grid.easy{grid-template-columns:repeat(4,1fr)}.grid.medium{grid-template-columns:repeat(4,1fr)}.grid.hard{grid-template-columns:repeat(6,1fr);max-width:980px}.memory-card{aspect-ratio:1/1;border:1px solid rgba(255,213,106,.35);border-radius:20px;background:linear-gradient(145deg,rgba(255,213,106,.18),rgba(255,255,255,.06));display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:transform .22s ease,background .22s ease;user-select:none;min-height:84px}.memory-card:hover{transform:translateY(-3px)}.front,.back{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;border-radius:20px;transition:opacity .18s ease}.front{flex-direction:column;padding:8px;opacity:0;background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.12)}.back{opacity:1;font-size:clamp(34px,5vw,54px);color:var(--gold)}.memory-card.open .front,.memory-card.matched .front{opacity:1}.memory-card.open .back,.memory-card.matched .back{opacity:0}.memory-card.matched{background:rgba(51,214,128,.18);border-color:var(--green);cursor:default}.emoji{font-size:clamp(34px,6vw,60px);line-height:1;margin-bottom:4px}.label{font-size:clamp(11px,2vw,16px);text-align:center;font-weight:800;color:var(--text)}.message{text-align:center;min-height:30px;font-weight:800;color:var(--gold);margin-top:10px}.rank{width:100%;border-collapse:collapse;margin-top:15px;background:rgba(0,0,0,.18);border-radius:18px;overflow:hidden}.rank th,.rank td{padding:13px;border-bottom:1px solid rgba(255,255,255,.12);text-align:left}.rank th{color:var(--gold);background:rgba(0,0,0,.25)}.medalha{font-size:24px}footer{text-align:center;opacity:.82;margin-top:18px;line-height:1.5}@media(max-width:680px){.wrap{padding:14px}.card{padding:18px}.grid.easy,.grid.medium,.grid.hard{grid-template-columns:repeat(3,1fr)}.memory-card{min-height:78px;border-radius:16px}}
</style>
</head>
<body>
<div class="wrap"><div class="card" id="app"></div><footer><a class="btnlink" href="../../">⬅ Voltar ao Portal</a><br>Escola Municipal Marciano Maciel da Silva • Projeto Marciano Maker</footer></div>
<script>
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbz-cGLcLMkKs46z42MIWyX7raAylOxjaWU_VOXztKvU2KRJvfLda7X8iWHLlQ1bn2x2yQ/exec";
const JOGO_ID="Memória Maker - Robótica";
const STORAGE_KEY="ranking_memoria_maker_robotica_top5";
const app=document.getElementById("app");
let aluno="",pontos=0,jogadas=0,paresEncontrados=0,totalPares=0,primeiraCarta=null,segundaCarta=null,travado=false,inicioTempo=null,timerInterval=null,segundos=0,dificuldadeAtual="medium";
const pecas=[{id:"led",emoji:"💡",nome:"LED"},{id:"bateria",emoji:"🔋",nome:"Bateria"},{id:"motor",emoji:"⚙️",nome:"Motor"},{id:"sensor",emoji:"📡",nome:"Sensor"},{id:"fio",emoji:"🔌",nome:"Fios"},{id:"robo",emoji:"🤖",nome:"Robô"},{id:"ferramenta",emoji:"🛠️",nome:"Ferramenta"},{id:"chip",emoji:"🧠",nome:"Chip"},{id:"controle",emoji:"🎮",nome:"Controle"},{id:"engrenagem",emoji:"⚙️",nome:"Engrenagem"},{id:"placa",emoji:"🟩",nome:"Placa"},{id:"energia",emoji:"⚡",nome:"Energia"}];
function cabecalhoInterno(){return '<img class="logo" src="../../assets/img/logo-marciano-maker.png" alt="Logo Marciano Maker" onerror="this.style.display=\'none\'">'}
function telaInicio(){pararTimer();app.innerHTML=`${cabecalhoInterno()}<h1>Memória Maker</h1><p class="sub">Encontre os pares das peças de robótica e mostre que você é um verdadeiro Engenheiro Maker!</p><label class="sub" for="nomeAluno">Digite o nome do aluno:</label><input id="nomeAluno" placeholder="Exemplo: Maria Eduarda" maxlength="30" value="${aluno||''}"><label class="sub" for="dificuldade">Escolha a dificuldade:</label><select id="dificuldade"><option value="easy" ${dificuldadeAtual==='easy'?'selected':''}>Fácil - 6 pares</option><option value="medium" ${dificuldadeAtual==='medium'?'selected':''}>Médio - 8 pares</option><option value="hard" ${dificuldadeAtual==='hard'?'selected':''}>Difícil - 12 pares</option></select><div class="actions"><button onclick="iniciarJogo()">Começar jogo</button><button onclick="telaRanking()">Ver Ranking</button></div><p class="sub" style="font-size:16px">Pontuação: acertos, tempo, dificuldade e quantidade de jogadas influenciam no resultado.</p>`}
function iniciarJogo(){const nome=document.getElementById("nomeAluno").value.trim();const dificuldade=document.getElementById("dificuldade").value;if(!nome){alert("Digite o nome do aluno para começar.");document.getElementById("nomeAluno").focus();return}aluno=nome;dificuldadeAtual=dificuldade;iniciarRodada()}function jogarNovamente(){if(!aluno){telaInicio();return}iniciarRodada()}function novoAluno(){aluno="";dificuldadeAtual="medium";telaInicio()}function iniciarRodada(){pontos=0;jogadas=0;paresEncontrados=0;primeiraCarta=null;segundaCarta=null;travado=false;segundos=0;inicioTempo=Date.now();totalPares=dificuldadeAtual==="easy"?6:dificuldadeAtual==="medium"?8:12;const selecionadas=pecas.slice(0,totalPares);const cartas=embaralhar([...selecionadas,...selecionadas].map((item,index)=>({...item,uid:item.id+"_"+index})));renderTabuleiro(cartas);iniciarTimer()}
function renderTabuleiro(cartas){app.innerHTML=`<div class="topbar"><div class="pill">👤 ${aluno}</div><div class="pill">⭐ Pontos: <span id="pontos">${pontos}</span></div><div class="pill">🎯 Jogadas: <span id="jogadas">${jogadas}</span></div><div class="pill">⏱️ Tempo: <span id="tempo">0s</span></div></div><h1>Memória Maker</h1><p class="sub">Encontre os pares das peças de robótica.</p><div id="grid" class="grid ${dificuldadeAtual}">${cartas.map(carta=>`<div class="memory-card" data-id="${carta.id}" data-uid="${carta.uid}" onclick="virarCarta(this)"><div class="front"><div class="emoji">${carta.emoji}</div><div class="label">${carta.nome}</div></div><div class="back">?</div></div>`).join("")}</div><div id="message" class="message"></div><div class="actions"><button onclick="telaInicio()">Trocar aluno</button></div>`}
function virarCarta(carta){if(travado||carta.classList.contains("open")||carta.classList.contains("matched"))return;carta.classList.add("open");if(!primeiraCarta){primeiraCarta=carta;return}segundaCarta=carta;jogadas++;document.getElementById("jogadas").textContent=jogadas;verificarPar()}
function verificarPar(){const mesmoPar=primeiraCarta.dataset.id===segundaCarta.dataset.id;if(mesmoPar){primeiraCarta.classList.add("matched");segundaCarta.classList.add("matched");paresEncontrados++;pontos+=20;atualizarPontos();document.getElementById("message").textContent="Muito bem! Você encontrou um par maker.";primeiraCarta=null;segundaCarta=null;if(paresEncontrados===totalPares)finalizarJogo()}else{travado=true;pontos=Math.max(0,pontos-3);atualizarPontos();document.getElementById("message").textContent="Ops! Essas peças não formam par.";setTimeout(()=>{primeiraCarta.classList.remove("open");segundaCarta.classList.remove("open");primeiraCarta=null;segundaCarta=null;travado=false;document.getElementById("message").textContent=""},850)}}
function finalizarJogo(){pararTimer();const bonusTempo=Math.max(0,120-segundos);const bonusJogadas=Math.max(0,(totalPares*4)-jogadas)*5;const bonusDificuldade=dificuldadeAtual==="hard"?80:dificuldadeAtual==="medium"?40:20;pontos+=bonusTempo+bonusJogadas+bonusDificuldade;atualizarPontos();salvarRanking(aluno,pontos,segundos,jogadas);setTimeout(()=>{app.innerHTML=`${cabecalhoInterno()}<h1>Missão cumprida!</h1><p class="sub">Parabéns, <strong>${aluno}</strong>! Você concluiu o desafio da memória maker.</p><div class="topbar"><div class="pill">⭐ Pontuação final: ${pontos}</div><div class="pill">⏱️ Tempo: ${segundos}s</div><div class="pill">🎯 Jogadas: ${jogadas}</div></div><p class="sub">Medalha conquistada: <strong>🤖 Engenheiro Maker da Robótica</strong></p><div class="actions"><button onclick="jogarNovamente()">Jogar novamente</button><button onclick="telaRanking()">Ver Ranking atualizado</button><button onclick="novoAluno()">Novo aluno</button></div><p class="sub" style="font-size:15px">Sua tentativa foi salva. O ranking mostra a melhor pontuação registrada por aluno.</p>`},600)}
function atualizarPontos(){const el=document.getElementById("pontos");if(el)el.textContent=pontos}
function iniciarTimer(){pararTimer();timerInterval=setInterval(()=>{segundos=Math.floor((Date.now()-inicioTempo)/1000);const el=document.getElementById("tempo");if(el)el.textContent=segundos+"s"},500)}
function pararTimer(){if(timerInterval){clearInterval(timerInterval);timerInterval=null}}
function embaralhar(array){return array.sort(()=>Math.random()-.5)}
function getRankingLocal(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||[]}catch(error){return[]}}
function setRankingLocal(lista){localStorage.setItem(STORAGE_KEY,JSON.stringify(lista.slice(0,50)))}
function salvarRanking(nome,pontuacao,tempo,jogadasFeitas){const lista=getRankingLocal();lista.push({nome,pontos:Number(pontuacao)||0,tempo,jogadas:jogadasFeitas,jogo:JOGO_ID,data:new Date().toLocaleDateString("pt-BR")});setRankingLocal(lista);fetch(SCRIPT_URL,{method:"POST",mode:"no-cors",body:JSON.stringify({nome,pontos:Number(pontuacao)||0,jogo:JOGO_ID,tempo,jogadas:jogadasFeitas})}).catch(()=>{})}function consolidarMelhorPorAluno(lista){const mapa={};lista.forEach(item=>{const nome=String(item.nome||"").trim();if(!nome)return;const chave=nome.toLowerCase();const pontosItem=Number(item.pontos)||0;const atual=mapa[chave]?Number(mapa[chave].pontos)||0:-1;if(!mapa[chave]||pontosItem>atual){mapa[chave]={nome,pontos:pontosItem,tempo:item.tempo||"",jogadas:item.jogadas||"",jogo:item.jogo||JOGO_ID,data:item.data||""}}});return Object.values(mapa).sort((a,b)=>Number(b.pontos)-Number(a.pontos)).slice(0,5)}
async function getRankingOnline(){try{const response=await fetch(SCRIPT_URL+"?jogo="+encodeURIComponent(JOGO_ID));const dados=await response.json();if(!Array.isArray(dados))return consolidarMelhorPorAluno(getRankingLocal());const filtrado=dados.filter(item=>!item.jogo||String(item.jogo).trim().toLowerCase()===JOGO_ID.toLowerCase()).map(item=>({nome:item.nome||"-",pontos:Number(item.pontos)||0,tempo:item.tempo||"",jogadas:item.jogadas||"",jogo:item.jogo||JOGO_ID,data:item.data||""}));return consolidarMelhorPorAluno(filtrado.length?filtrado:getRankingLocal())}catch(error){return consolidarMelhorPorAluno(getRankingLocal())}}
function medalha(indice){if(indice===0)return"🥇";if(indice===1)return"🥈";if(indice===2)return"🥉";return"⭐"}
async function telaRanking(){pararTimer();app.innerHTML=`${cabecalhoInterno()}<h1>Ranking Memória Maker</h1><p class="sub">Carregando melhores pontuações...</p>`;const lista=await getRankingOnline();const linhas=lista.length?lista.map((registro,indice)=>`<tr><td class="medalha">${medalha(indice)}</td><td>${registro.nome||"-"}</td><td>${registro.pontos||0}</td><td>${registro.tempo?registro.tempo+"s":"-"}</td><td>${registro.jogadas||"-"}</td></tr>`).join(""):'<tr><td colspan="5">Ainda não há pontuações registradas.</td></tr>';app.innerHTML=`${cabecalhoInterno()}<h1>Ranking Memória Maker</h1><p class="sub">Top 5 do desafio de robótica. Melhor pontuação por aluno.</p><table class="rank"><thead><tr><th></th><th>Aluno</th><th>Pontos</th><th>Tempo</th><th>Jogadas</th></tr></thead><tbody>${linhas}</tbody></table><div class="actions"><button onclick="jogarNovamente()">Jogar novamente</button><button onclick="telaInicio()">Voltar ao início</button><button onclick="novoAluno()">Novo aluno</button><button onclick="limparRankingLocal()">Limpar ranking local</button></div>`}
function limparRankingLocal(){if(confirm("Deseja apagar apenas o ranking salvo neste computador?")){localStorage.removeItem(STORAGE_KEY);telaRanking()}}
telaInicio();
</script>
</body>
</html>
